<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>How's your day? 💖</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{height:100vh;overflow:hidden;display:flex;justify-content:center;align-items:center;background:linear-gradient(-45deg,#ff9ccf,#ff6fb5,#f7a8d9,#ffd5ea);background-size:400% 400%;animation:bg 12s ease infinite}
@keyframes bg{0%,100%{background-position:0 50%}50%{background-position:100% 50%}}
.heart{position:fixed;bottom:-40px;font-size:22px;animation:float linear forwards;opacity:.8}
@keyframes float{to{transform:translateY(-120vh) rotate(360deg);opacity:0}}
.card{backdrop-filter:blur(16px);background:rgba(255,255,255,.22);padding:30px;border-radius:28px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,.18);width:90%;max-width:360px}
h1{color:#fff;font-size:2rem;margin-bottom:28px}
.buttons{display:flex;justify-content:center;gap:14px;position:relative;height:70px}
button{border:none;border-radius:16px;padding:15px 26px;font-size:22px;font-weight:bold;cursor:pointer;transition:.35s}
#good{background:#fff;color:#ff4f9a}
#bad{background:#ff4f7a;color:#fff;position:absolute;left:190px}
.final{display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;color:#fff;text-align:center;padding:20px}
.final h1{font-size:2.4rem;animation:pop .8s}
.final p{font-size:1.2rem}
@keyframes pop{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}
</style>
</head>
<body>
<div class="card">
<h1>How's your day going? 💖</h1>
<div class="buttons">
<button id="good">Good 😊</button>
<button id="bad">Bad 😢</button>
</div>
</div>
<script>
let c=0,s=1;
const g=document.getElementById('good');
const b=document.getElementById('bad');
function heart(){
 let h=document.createElement('div');
 h.className='heart';h.textContent='💖';
 h.style.left=Math.random()*100+'vw';
 h.style.animationDuration=(4+Math.random()*4)+'s';
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),8000);
}
setInterval(heart,350);
b.onclick=()=>{
 c++; s+=0.18; g.style.transform=`scale(${s})`;
 b.style.left=(20+Math.random()*220)+'px';
 b.style.top=(-10+Math.random()*40)+'px';
 if(c>=6)b.style.display='none';
}
g.onclick=()=>{
 document.body.innerHTML=`<div class="final">
 <h1>🥹💖 I Know...</h1>
 <h1>Enjoy Your Day, Cutie! 🌸💕</h1>
 <p>✨ Keep Smiling • Stay Happy • You're Awesome 💗</p>
 </div>`;
 setInterval(()=>{
 let h=document.createElement('div');
 h.className='heart';h.textContent=Math.random()>.5?'💖':'🌸';
 h.style.left=Math.random()*100+'vw';
 h.style.animationDuration=(3+Math.random()*3)+'s';
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),7000);
 },200);
}
</script>
</body>
</html>
